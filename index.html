<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow MIDI Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <style>
        /* 虹色のアニメーション背景 */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow 18s ease infinite;
        }

        @keyframes rainbow {
            0%{background-position:0% 82%}
            50%{background-position:100% 19%}
            100%{background-position:0% 82%}
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7); /* 半透明の黒で文字を見やすく */
            padding: 30px;
            border-radius: 20 hurried;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            margin-top: 20px;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌈 Roblox MIDI to 1-Line JSON</h2>
        <p>MIDIを選択すると、無駄な改行ゼロの1行JSONを生成します</p>
        
        <input type="file" id="midi-file" accept=".mid,.midi">
        <br>
        <button onclick="copyToClipboard()">JSONをコピーする</button>
        
        <textarea id="result-json" placeholder="ここに1行のデータが出ます..."></textarea>
    </div>

    <script>
        document.getElementById('midi-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const midi = new Midi(event.target.result);
                let allNotes = [];
                
                midi.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        let nName = note.name.replace('#', 'sharp').toLowerCase();
                        nName = nName.charAt(0).toUpperCase() + nName.slice(1);
                        
                        allNotes.push({
                            time: note.time,
                            key: `Key${note.octave}${nName}`
                        });
                    });
                });

                allNotes.sort((a, b) => a.time - b.time);

                let lastTime = 0;
                const result = allNotes.map(n => {
                    const delay = Math.max(0, n.time - lastTime);
                    lastTime = n.time;
                    return { 
                        key: n.key, 
                        delay: Math.round(delay * 1000) / 1000 
                    };
                });

                // 改行・空白なしの完全1行出力
                document.getElementById('result-json').value = JSON.stringify(result);
            };
            reader.readAsArrayBuffer(file);
        });

        function copyToClipboard() {
            const area = document.getElementById('result-json');
            if (!area.value) return;
            area.select();
            document.execCommand('copy');
            alert('コピーしました！');
        }
    </script>
</body>
</html>
